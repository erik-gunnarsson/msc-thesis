name: Smoke Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: WIOD smoke (compile + imports + core loaders + funnel)
        run: uv run python code/secondary/smoke_test.py

      - name: Validate committed WIOD artifacts
        run: uv run python code/secondary/_validate_artifacts.py
